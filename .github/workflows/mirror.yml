name: Mirror Invidious to Docker Hub

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      SRC_NS: quay.io/invidious
      DST_NS: docker.io/sirfergy
      # One Quay repo per line; each repo's :latest tag is mirrored (all architectures).
      REPOS: |
        invidious
        invidious-companion
        invidious-redirect
        inv-sig-helper
        youtube-trusted-session-generator
        smart-ipv6-rotator
        lsquic-compiled
        instances
        invidious.io
        docs.invidious.io
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | skopeo login docker.io -u sirfergy --password-stdin

      - name: Mirror all images (latest, all architectures)
        run: |
          set -uo pipefail
          failed=""
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "::group::mirror $repo:latest"
            if skopeo copy --all --retry-times 3 \
                "docker://$SRC_NS/$repo:latest" "docker://$DST_NS/$repo:latest"; then
              echo "ok: $repo"
            else
              echo "::error::failed to mirror $repo"
              failed="$failed $repo"
            fi
            echo "::endgroup::"
          done <<< "$REPOS"
          if [ -n "$failed" ]; then
            echo "Mirrored with failures:$failed"
            exit 1
          fi
          echo "All images mirrored successfully."

      - name: Log out
        if: always()
        run: skopeo logout docker.io || true
