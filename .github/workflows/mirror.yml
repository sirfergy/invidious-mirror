name: Mirror Invidious to Docker Hub

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      SRC_NS: quay.io/invidious
      DST_NS: docker.io/sirfergy
      # One Quay image per line; every tag is mirrored with all architectures.
      IMAGES: |
        invidious:latest
        invidious:master
        invidious-companion:latest
        invidious-redirect:latest
        inv-sig-helper:latest
        youtube-trusted-session-generator:latest
        smart-ipv6-rotator:latest
        lsquic-compiled:latest
        instances:latest
        invidious.io:latest
        docs.invidious.io:latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | skopeo login docker.io -u sirfergy --password-stdin

      - name: Mirror all images (latest, all architectures)
        run: |
          set -uo pipefail
          failed=""
          while read -r image; do
            [ -z "$image" ] && continue
            echo "::group::mirror $image"
            if skopeo copy --all --retry-times 3 \
                "docker://$SRC_NS/$image" "docker://$DST_NS/$image"; then
              echo "ok: $image"
            else
              echo "::error::failed to mirror $image"
              failed="$failed $image"
            fi
            echo "::endgroup::"
          done <<< "$IMAGES"
          if [ -n "$failed" ]; then
            echo "Mirrored with failures:$failed"
            exit 1
          fi
          echo "All images mirrored successfully."

      - name: Log out
        if: always()
        run: skopeo logout docker.io || true
